<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>훈탐구</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@300;400;700&family=Noto+Serif:wght@300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAFAF7; --card:#FFFFFF; --border:#EAE6E0;
  --text:#2A2420; --mid:#7A6E68; --light:#B4AEA8;
  --green:#5BAA5B; --sky:#5AABC8; --panel:#2D2520;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--panel);color:var(--text)}
body{display:flex;align-items:center;justify-content:center;padding:24px}

.launcher{
  background:var(--bg);border-radius:16px;padding:48px 56px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  max-width:560px;width:100%;
}
.logo{font-size:36px;font-weight:700;font-family:'Noto Serif KR',serif;letter-spacing:-1px}
.logo em{color:var(--green);font-style:normal}
.sub{font-size:11px;color:var(--light);letter-spacing:.3em;margin-bottom:8px}
.tag{font-size:13px;color:var(--mid);margin-bottom:24px;text-align:center;line-height:1.6}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
.card{
  background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  padding:24px 18px;text-align:center;cursor:pointer;text-decoration:none;color:inherit;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:transform .15s,box-shadow .15s,border-color .15s;
}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.1);border-color:var(--green)}
.card.tool:hover{border-color:var(--sky)}

.icon{
  width:54px;height:54px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#fff;font-family:'Noto Serif',serif;font-weight:300;
}
.icon.app  {background:linear-gradient(135deg,#8CD48C,#5BAA5B)}
.icon.tool {background:linear-gradient(135deg,#88CCEE,#5AABC8)}
.card-title{font-size:15px;font-weight:700;color:var(--text)}
.card-desc {font-size:11px;color:var(--mid);line-height:1.5}

footer{
  margin-top:24px;font-size:10px;color:var(--light);text-align:center;letter-spacing:.05em;
}
</style>
</head>
<body>

<div class="launcher">
  <div class="logo">훈<em>탐구</em></div>
  <div class="sub">訓 探 究</div>
  <div class="tag">한자의 훈(訓)을 합쳐 어휘 의미를 추론하는 감각 훈련<br>로컬 작업용 런처입니다</div>

  <div class="cards">
    <a class="card" href="word-sense.html">
      <div class="icon app">生</div>
      <div class="card-title">학습 앱 열기</div>
      <div class="card-desc">학습자가 보는 화면<br>오늘의 훈 탐구 시작</div>
    </a>
    <a class="card tool" href="validate.html">
      <div class="icon tool">✓</div>
      <div class="card-title">콘텐츠 검증</div>
      <div class="card-desc">새 회차 데이터를<br>data.js 반영 전 검수</div>
    </a>
  </div>

  <footer>word-sense / 훈탐구 v0.1</footer>
</div>

</body>
</html>
